name: Run Playwright Tests

on:
  workflow_dispatch:
    inputs:
      feed_id:
        description: 'Feed ID to search'
        required: true
      file_ids:
        description: 'Comma-separated File IDs (example: 1625134,1625135)'
        required: true

jobs:
  test:
    runs-on: self-hosted
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install

      - name: Run Playwright tests
        run: npx playwright test tests/comrec.spec.ts --headed --reporter=list
        env:
          DEBUG: pw:api
          USERNAME_COMREC: ${{ secrets.USERNAME_COMREC }}
          PASSWORD_COMREC: ${{ secrets.PASSWORD_COMREC }}
          FEED_ID: ${{ github.event.inputs.feed_id }}
          FILE_IDS: ${{ github.event.inputs.file_ids }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: screenshots/

      - name: Upload downloads
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: downloads
          path: downloads/

      - name: Cleanup browser processes
        if: always()
        shell: powershell
        run: |
          $processNames = @('chrome', 'chromium')
          foreach ($processName in $processNames) {
            Get-Process -Name $processName -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue
          }