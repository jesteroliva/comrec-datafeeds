name: Run Playwright Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: self-hosted
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install

      - name: Run Playwright tests
        run: npx playwright test tests/comrec.spec.ts --headed --reporter=list
        env:
          DEBUG: pw:api
          USERNAME_COMREC: ${{ secrets.USERNAME_COMREC }}
          PASSWORD_COMREC: ${{ secrets.PASSWORD_COMREC }}
          FEED_ID: ${{ secrets.FEED_ID }}
          FILE_IDS: ${{ secrets.FILE_IDS }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: screenshots/